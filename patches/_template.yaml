# Copy to patches/<repo>.yaml and fill in. See docs/adopt-new-repo.md.
# Supported agents: Cursor (.cursor/commands/, .cursor/rules/) + Claude (.claude/commands/).
# Legacy keys agents_opencode, agents_junie, agents_jetbrains, bin are NOT supported and will
# cause adopt to exit with an error.
# Scope: this bundle installs LSI (lsi-*) commands only. OpenSpec (opsx-*) slash
# commands are owned by OpenSpec (openspec init / config profile) — adopt never
# installs or removes them, and the parity gate ignores the opsx-* namespace.
repo: my-repo
overlay: lsi
layout: lsi
canonical: .lsi/workflows

project:
  REPO_NAME: my-repo
  TITLE_PREFIX: "My Repo | "
  BASE_BRANCH: main
  PR_TARGET_BRANCH: staging
  PROTECTED_BRANCHES: "main, staging"  # e.g. web adds master; ai-agent adds test
  SOURCE_ROOT: "src/"
  TEST_ROOT: tests/
  TEST_COMMAND: "npm test"
  PR_HOST: Bitbucket
  BITBUCKET_REMOTE: org/my-repo
  VERSION_FILE: version.txt  # or VERSION for monorepos
  PR_WARN_FILES: "15"
  PR_WARN_LINES: "250"
  PR_MAX_FILES: "25"
  PR_MAX_LINES: "400"
  PR_MAX_COMMITS: "12"
  PR_MAX_PRIMARY_CONCERNS: "1"
  PR_MAX_SCOPES: "3"

# scope_exclude_globs:  # optional — PR size limits
#   - package-lock.json

preserve:
  - bitbucket-pipelines.yml
  # - docs/workflows/my-runbook.md
  # - .cursor/rules/my-domain.mdc

overlay_files:
  ticket-card-info.md: patches/files/my-repo/ticket-card-info.md
  test-requirements.md: patches/files/my-repo/test-requirements.md
  versioning-and-releases.md: patches/files/my-repo/versioning-and-releases.md

# remove_after_adopt:
#   - docs/workflows/legacy-workflow.md
#   - .cursor/rules/legacy-rule.mdc

agents_claude:
  canonical: AGENTS.md
  claude_symlink: true
  reconcile_sources:
    - CLAUDE.md
  # stub_after_merge: docs/agents/coding-agents.md

merge:
  AGENTS.md:
    markers: [lsi:workflows, lsi:domain]
  cursorrules:
    marker_block: lsi:workflows

bootstrap:
  version.txt: "0.1.0"
  # VERSION: "0.1.0"
  # VERSION_FILE: VERSION

ci_hook:
  add_check_version: true  # documents snippet only; adopt does not edit pipelines
